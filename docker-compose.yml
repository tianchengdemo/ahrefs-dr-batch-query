services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ahrefs-api
    ports:
      - "127.0.0.1:8000:8000"
    expose:
      - "8000"
    volumes:
      - ./config.py:/app/config.py:ro
      - ./.omc:/app/.omc
      - ./cookies.txt:/app/cookies.txt:ro
    environment:
      REDIS_ENABLED: "true"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_CACHE_TTL_SECONDS: "21600"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: ahrefs-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: "${CADDY_DOMAIN}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ahrefs-redis
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 2048mb
      - --maxmemory-policy
      - allkeys-lru
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
