services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ahrefs-api
    ports:
      - "8000:8000"
    volumes:
      - ./config.py:/app/config.py:ro
      - ./.omc:/app/.omc
      - ./cookies.txt:/app/cookies.txt:ro
    environment:
      REDIS_ENABLED: "true"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_CACHE_TTL_SECONDS: "21600"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ahrefs-redis
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 2048mb
      - --maxmemory-policy
      - allkeys-lru
    restart: unless-stopped
